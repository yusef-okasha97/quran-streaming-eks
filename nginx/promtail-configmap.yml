# Promtail فقط (وكيل صغير داخل الـ Pod). هذا الملف لا يثبّت Grafana ولا Prometheus — أنت مثبتاهم أصلاً على الكلستر.
# اللوجات النصية تُرسل إلى Loki (إن كان عندك في الستاك)، وGrafana تعرضها من هناك. Prometheus يجمع metrics وليس سطور اللوج.
# لو خدمة Loki عندك باسم/نيم سبيس مختلف، غيّر السطر clients.url أدناه فقط.
apiVersion: v1
kind: ConfigMap
metadata:
  name: quran-promtail-config
  namespace: nginx-app
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: ""

    scrape_configs:
      - job_name: quran-app-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: quran-app
              app: nginx
              __path__: /var/log/quran-app/*.log
