apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: quran-app
          image: yoyo7sniper97/quran-app-argo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5050
          
          # 1. Readiness Probe: 
          readinessProbe:
            httpGet:
              path: /          
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3

          # 2. Liveness Probe: 
          livenessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
